name: Send Scheduled Push Notifications

on:
  schedule:
    # Runs every minute
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    name: Trigger Vercel Cron Endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 1

    steps:
      - name: Call /api/cron-reminders on Vercel
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "x-firebase-sa: present" \
            "https://mavia-app.vercel.app/api/cron-reminders" \
            && echo " OK" || echo " FAILED"
