<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4829E"/>
      <stop offset="100%" stop-color="#6B4558"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="squircle">
      <path d="M50,2 C74,2 98,26 98,50 C98,74 74,98 50,98 C26,98 2,74 2,50 C2,26 26,2 50,2 Z"/>
    </clipPath>
  </defs>

  <!-- Background squircle -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="100" height="50" rx="22" ry="22" fill="url(#glow)"/>

  <!-- 5-petal flower: petals as ellipses rotated around center -->
  <g transform="translate(50,50)" opacity="0.95">
    <!-- Petal 1 -->
    <ellipse cx="0" cy="-19" rx="7" ry="13" fill="white" opacity="0.92" transform="rotate(0)"/>
    <!-- Petal 2 -->
    <ellipse cx="0" cy="-19" rx="7" ry="13" fill="white" opacity="0.92" transform="rotate(72)"/>
    <!-- Petal 3 -->
    <ellipse cx="0" cy="-19" rx="7" ry="13" fill="white" opacity="0.92" transform="rotate(144)"/>
    <!-- Petal 4 -->
    <ellipse cx="0" cy="-19" rx="7" ry="13" fill="white" opacity="0.92" transform="rotate(216)"/>
    <!-- Petal 5 -->
    <ellipse cx="0" cy="-19" rx="7" ry="13" fill="white" opacity="0.92" transform="rotate(288)"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="7" fill="white"/>
  </g>
</svg>
